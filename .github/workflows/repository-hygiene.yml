name: Repository hygiene

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, reopened, synchronize, closed]
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Report actions without closing PRs or deleting branches
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: repository-hygiene
  cancel-in-progress: false

jobs:
  maintain:
    if: github.repository == 'TakashiSasaki/agent-policy'
    runs-on: ubuntu-latest
    steps:
      # pull_request_target executes the trusted workflow from main. Do not checkout
      # or execute files from the pull request head branch in this workflow.
      - name: Checkout trusted default branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Close redundant PRs and delete safely merged branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          arguments=()
          if [[ "$EVENT_NAME" != "workflow_dispatch" || "$MANUAL_DRY_RUN" != "true" ]]; then
            arguments+=(--apply)
          fi
          python scripts/maintain_github.py "${arguments[@]}"
