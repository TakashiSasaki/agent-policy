name: Deploy documentation to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Fetch bootstrap-agent-policy tree
        run: >-
          git fetch --no-tags --depth=1 origin
          bootstrap-agent-policy:refs/remotes/origin/bootstrap-agent-policy

      - name: Verify documented repository trees
        run: python scripts/verify-repository-structure.py --check

      - name: Generate repository file previews
        run: python scripts/generate_repository_preview.py

      - name: Install documentation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt

      - name: Generate documentation assets
        run: python scripts/generate-doc-assets.py

      - name: Record documentation build metadata
        env:
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_REPOSITORY: ${{ github.repository }}
          BUILD_RUN_ID: ${{ github.run_id }}
          BUILD_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          from zoneinfo import ZoneInfo
          import json
          import os

          built_at = datetime.now(timezone.utc)
          metadata = {
              "built_at_utc": built_at.isoformat().replace("+00:00", "Z"),
              "built_at_jst": built_at.astimezone(ZoneInfo("Asia/Tokyo")).isoformat(),
              "commit": os.environ["BUILD_COMMIT"],
              "repository": os.environ["BUILD_REPOSITORY"],
              "run_id": int(os.environ["BUILD_RUN_ID"]),
              "run_number": int(os.environ["BUILD_RUN_NUMBER"]),
          }
          Path("docs/build-info.json").write_text(
              json.dumps(metadata, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build documentation
        run: mkdocs build --strict --clean

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
