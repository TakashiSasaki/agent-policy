name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}
      - name: Apply PR 14 review fix
        run: python .github/pr14_review_fix.py
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - run: ruff --version
      - run: ruff check src tests scripts
      - run: pytest
      - run: python -m compileall -q src scripts
      - name: Commit PR 14 review fix
        run: |
          if git diff --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/agent_policy/adoption.py src/agent_policy/commands/adopt.py tests/test_adoption_preview_finalize.py docs/cli.md docs/configuration.md
          git commit -m "Guard all immutable adoption sources during finalize"
          git push origin HEAD:${{ github.head_ref }}
