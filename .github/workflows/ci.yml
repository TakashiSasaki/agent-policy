name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}
      - name: Apply PR 14 review fix
        run: |
          python - <<'PY'
          from pathlib import Path

          adoption = Path("src/agent_policy/adoption.py")
          text = adoption.read_text(encoding="utf-8")
          old = '''def changed_adoption_sources(
              repository_root: Path,
              state: dict[str, Any],
          ) -> tuple[str, ...]:
              editable_policy_paths = set(state["project_policy_files"])
              editable_policy_paths.discard(state["primary_instructions"])
              changed: list[str] = []
              for item in state["sources"]:
                  relative = item["path"]
                  if relative in editable_policy_paths:
                      continue
                  lexical_name = lexical_relative_name(repository_root, relative)
                  path = resolve_inside(repository_root, lexical_name, allow_missing=True)
                  if not path.is_file() or sha256_file(path) != item["sha256"]:
                      changed.append(relative)
              return tuple(sorted(changed))
          '''
          new = '''def immutable_adoption_sources(
              state: dict[str, Any],
          ) -> tuple[dict[str, Any], ...]:
              editable_policy_paths = set(state["project_policy_files"])
              editable_policy_paths.discard(state["primary_instructions"])
              return tuple(
                  sorted(
                      (
                          item
                          for item in state["sources"]
                          if item["path"] not in editable_policy_paths
                      ),
                      key=lambda item: item["path"],
                  )
              )


          def changed_adoption_sources(
              repository_root: Path,
              state: dict[str, Any],
          ) -> tuple[str, ...]:
              changed: list[str] = []
              for item in immutable_adoption_sources(state):
                  relative = item["path"]
                  lexical_name = lexical_relative_name(repository_root, relative)
                  path = resolve_inside(repository_root, lexical_name, allow_missing=True)
                  if not path.is_file() or sha256_file(path) != item["sha256"]:
                      changed.append(relative)
              return tuple(sorted(changed))
          '''
          if old not in text:
              raise SystemExit("adoption source block not found")
          adoption.write_text(text.replace(old, new), encoding="utf-8")

          command = Path("src/agent_policy/commands/adopt.py")
          text = command.read_text(encoding="utf-8")
          old = '''    finalized_adoption_state,
              inspect_repository,
          '''
          new = '''    finalized_adoption_state,
              immutable_adoption_sources,
              inspect_repository,
          '''
          if old not in text:
              raise SystemExit("adopt import block not found")
          text = text.replace(old, new)
          old = '''        live_artifacts.update(
                  _snapshot_required_files(
                      repository_root,
                      [
                          state["primary_instructions"],
                          *state["project_policy_files"],
                      ],
                  )
              )
          '''
          new = '''        guarded_source_names = {
                  item["path"] for item in immutable_adoption_sources(state)
              }
              guarded_source_names.update(state["project_policy_files"])
              live_artifacts.update(
                  _snapshot_required_files(
                      repository_root,
                      sorted(guarded_source_names),
                  )
              )
          '''
          if old not in text:
              raise SystemExit("live artifact block not found")
          command.write_text(text.replace(old, new), encoding="utf-8")

          tests = Path("tests/test_adoption_preview_finalize.py")
          text = tests.read_text(encoding="utf-8")
          marker = '''def test_finalized_state_cannot_preview_or_finalize_again(tmp_path: Path) -> None:
          '''
          addition = '''@pytest.mark.parametrize(
              ("relative", "content"),
              [
                  ("CLAUDE.md", b"secondary instructions\\n"),
                  (".agents/skills/manual/SKILL.md", b"# Manual skill\\n"),
              ],
          )
          def test_finalize_rejects_other_immutable_source_change_at_transaction_boundary(
              tmp_path: Path,
              monkeypatch,
              relative: str,
              content: bytes,
          ) -> None:
              (tmp_path / ".git").mkdir()
              primary = tmp_path / "AGENTS.md"
              primary.write_text("handwritten instructions\\n", encoding="utf-8")
              original_primary = primary.read_bytes()
              target = tmp_path / relative
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(content)
              diagnostics = adopt.prepare_run(
                  tmp_path,
                  ".agent-policy.yml",
                  apply=True,
                  toolchain_revision="LOCAL-DEVELOPMENT",
                  profiles=["core", "security-baseline"],
                  verification_command="npm run verify:pr",
              )
              assert diagnostics == []

              concurrent = b"concurrent immutable source change\\n"
              original_apply = adopt._apply_transaction

              def race_then_apply(*args, **kwargs):
                  target.write_bytes(concurrent)
                  return original_apply(*args, **kwargs)

              monkeypatch.setattr(adopt, "_apply_transaction", race_then_apply)

              diagnostics = adopt.finalize_run(tmp_path, apply=True)

              assert len(diagnostics) == 1
              assert diagnostics[0].code == "ADOPT_FINALIZE"
              assert "changed during finalization" in diagnostics[0].message
              assert target.read_bytes() == concurrent
              assert primary.read_bytes() == original_primary
              assert not (tmp_path / adopt.DEFAULT_BACKUP_PATH).exists()


          '''
          if marker not in text:
              raise SystemExit("test insertion marker not found")
          tests.write_text(text.replace(marker, addition + marker), encoding="utf-8")

          cli = Path("docs/cli.md")
          text = cli.read_text(encoding="utf-8")
          old = "finalizeはconfig、state、lock、preview、primary instruction、project policyを一つの入力snapshotとして扱います。temporary repositoryがそのsnapshotと一致することをrender前に検査し、最初の実書込み直前にもlive repositoryのbytesを再比較します。したがって、validationとstagingの間、またはstagingとtransactionの間にprimaryやpolicyが変更された場合もcutoverせず停止します。"
          new = "finalizeはconfig、state、lock、preview、adoption stateに記録された全immutable source、project policyを一つの入力snapshotとして扱います。temporary repositoryがそのsnapshotと一致することをrender前に検査し、最初の実書込み直前にもlive repositoryのbytesを再比較します。したがって、validationとstagingの間、またはstagingとtransactionの間にprimary、追加instruction、handwritten skill、policyのいずれかが変更された場合もcutoverせず停止します。"
          if old not in text:
              raise SystemExit("CLI documentation text not found")
          cli.write_text(text.replace(old, new), encoding="utf-8")

          configuration = Path("docs/configuration.md")
          text = configuration.read_text(encoding="utf-8")
          old = "Before `adopt finalize --apply` stages or writes the cutover, it snapshots the config, adoption state, lock, preview, retained primary instruction, and every project-policy input. The temporary repository must contain exactly those bytes before rendering, and the live repository must still contain them immediately before the transaction. A concurrent change therefore aborts rather than producing instructions from an unvalidated primary or policy revision."
          new = "Before `adopt finalize --apply` stages or writes the cutover, it snapshots the config, adoption state, lock, preview, every immutable source recorded in the adoption inventory, and every project-policy input. The temporary repository must contain exactly those bytes before rendering, and the live repository must still contain them immediately before the transaction. A concurrent change therefore aborts rather than finalizing against an unvalidated instruction, handwritten skill, or policy revision."
          if old not in text:
              raise SystemExit("configuration documentation text not found")
          configuration.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - run: ruff --version
      - run: ruff check src tests scripts
      - run: pytest
      - run: python -m compileall -q src scripts
      - name: Commit PR 14 review fix
        run: |
          if git diff --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/agent_policy/adoption.py src/agent_policy/commands/adopt.py tests/test_adoption_preview_finalize.py docs/cli.md docs/configuration.md
          git commit -m "Guard all immutable adoption sources during finalize"
          git push origin HEAD:${{ github.head_ref }}
