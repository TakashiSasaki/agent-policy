name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - run: ruff --version
      - name: Run Ruff and capture diagnostics
        id: ruff
        continue-on-error: true
        run: ruff check src tests scripts --output-format=json > ruff-report.json
      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ruff-report
          path: ruff-report.json
          if-no-files-found: error
      - name: Fail on Ruff diagnostics
        if: steps.ruff.outcome == 'failure'
        run: |
          cat ruff-report.json
          exit 1
      - run: pytest
      - run: python -m compileall -q src scripts
