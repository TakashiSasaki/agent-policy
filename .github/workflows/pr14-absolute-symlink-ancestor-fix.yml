name: Apply PR 14 absolute symlink ancestor fix

on:
  push:
    branches: [agent/adoption-preview-finalize]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: agent/adoption-preview-finalize
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: python .github/pr14_absolute_symlink_ancestor_fix.py
      - run: python -m pip install -e '.[dev]'
      - run: ruff check src tests scripts
      - run: pytest
      - run: python -m compileall -q src scripts
      - name: Commit reviewed fix
        run: |
          rm .github/pr14_absolute_symlink_ancestor_fix.py
          rm .github/workflows/pr14-absolute-symlink-ancestor-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Reject absolute symlink ancestors in adoption sources"
          git push origin HEAD:agent/adoption-preview-finalize
