{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <link rel="manifest" href="{{ 'manifest.webmanifest' | url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ 'assets/icons/favicon-32.png' | url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ 'assets/icons/favicon-16.png' | url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ 'assets/icons/apple-touch-icon.png' | url }}">
  <meta name="theme-color" content="#063b5a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="agent-policy">
{% endblock %}
