name: Agent Policy Compiler
description: Validate, render, or check repository agent-policy configuration
inputs:
  command:
    description: One of validate, render, check, or init
    required: false
    default: check
  config:
    description: Configuration path relative to the checked-out repository
    required: false
    default: .agent-policy.yml
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.12'
    - name: Install agent-policy
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Run agent-policy
      shell: bash
      run: agent-policy "${{ inputs.command }}" --config "${{ inputs.config }}"
